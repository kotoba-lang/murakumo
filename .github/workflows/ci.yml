name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # bb.edn's :deps references kotoba-fleet by :local/root sibling path.
      - run: git clone --depth 1 https://github.com/kotoba-lang/kotoba-fleet.git ../kotoba-fleet
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - run: bb test
      - run: clojure -M:lint
